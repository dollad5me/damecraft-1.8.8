<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Version</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100%; height: 100vh;
            background: radial-gradient(ellipse at center, #0a0a1a 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        h1 {
            font-size: 13px;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00f0ff, #a855f7, #00f0ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 2s linear infinite;
            margin-bottom: 8px;
        }

        p {
            font-size: 11px;
            color: #333;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 48px;
        }

        .cards {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            width: 200px;
            padding: 28px 20px;
            border: 1px solid #1a1a2e;
            border-radius: 12px;
            background: #0d0d1a;
            text-align: center;
            text-decoration: none;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #00f0ff;
            box-shadow: 0 0 24px rgba(0, 240, 255, 0.15);
        }

        .card .version {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, #00f0ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .card .label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #444;
        }

        .credit {
            position: fixed;
            bottom: 18px;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #333;
        }

        .credit span {
            background: linear-gradient(90deg, #00f0ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        @keyframes shimmer {
            from { background-position: 0% center; }
            to { background-position: 200% center; }
        }
    </style>
</head>
<body>

    <h1>Select a Version</h1>
    <p>Choose your experience</p>

    <div class="cards">
        <a class="card" href="/1.8.8/">
            <div class="version">1.8.8</div>
            <div class="label">Multiplayer + Singleplayer</div>
        </a>
        <a class="card" href="/1.12.2/">
            <div class="version">1.12.2</div>
            <div class="label">Offline</div>
        </a>
        <a class="card" href="/1.9/">
            <div class="version">1.9</div>
            <div class="label">Offline</div>
        </a>
    </div>

    <div class="credit">Programmed by <span>DAME</span></div>

</body>
</html>
