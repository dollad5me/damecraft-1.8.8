<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
	<meta name="description" content="hi ishan and dhruv" />
	<meta name="keywords" content="hi ishan and dhruv" />
	<title>dame da best software engineer</title>
	<meta property="og:locale" content="en-US" />
	<meta property="og:type" content="website" />
	<meta property="og:title" content="dame da best software engineer" />
	<meta property="og:description" content="hi ishan and dhruv" />
	<meta property="og:image" content="favicon.png" />
	<link type="image/png" rel="shortcut icon" href="favicon.png" />
	<script type="text/javascript" src="classes.js"></script>
	<script type="text/javascript">
		"use strict";

		window.addEventListener("load", function () {
			if (window.location.href.indexOf("file:") === 0) {
				alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
			} else {

				// %%%%%%%%% launch options %%%%%%%%%%%%

				var relayId = Math.floor(Math.random() * 3);
				window.eaglercraftXOpts = {
					demoMode: false,
					container: "game_frame",
					assetsURI: "assets.epk",
					localesURI: "lang/",
					worldsDB: "worlds",
					servers: [
						{ addr: "wss://mc.voidsent.net/", name: "Voidsent" },
						{ addr: "wss://krypticmc.net/", name: "KrypticMC" }
					],
					relays: [
						{ addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId == 0 },
						{ addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId == 1 },
						{ addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId == 2 }
					]
				};

				// %%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%

				// ---- Countdown lives INSIDE the load listener ----
				var countdown = 5;
				var countEl = document.getElementById("count");
				var splashEl = document.getElementById("splash");
				var progressBar = document.getElementById("progress-bar");

				// Kick off the shrink immediately
				setTimeout(function () {
					progressBar.style.width = "0%";
				}, 50);

				var timer = setInterval(function () {
					countdown--;
					countEl.style.transform = "translate(-50%, -50%) scale(1.3)";
					countEl.style.opacity = "0.5";
					setTimeout(function () {
						countEl.textContent = countdown;
						countEl.style.transform = "translate(-50%, -50%) scale(1)";
						countEl.style.opacity = "1";
					}, 150);
					if (countdown <= 0) {
						clearInterval(timer);
						splashEl.style.transition = "opacity 0.5s ease";
						splashEl.style.opacity = "0";
						setTimeout(function () {
							splashEl.style.display = "none";
							main();
						}, 500);
					}
				}, 1000);

			}
		});
	</script>
</head>

<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame">
	<div id="splash" style="
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: radial-gradient(ellipse at center, #0a0a1a 0%, #000000 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: 'Segoe UI', sans-serif;
    ">
		<!-- Animated ring -->
		<div style="
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 32px;
        ">
			<svg viewBox="0 0 120 120" style="
                width: 120px; height: 120px;
                animation: spin 1.5s linear infinite;
                position: absolute; top: 0; left: 0;
            ">
				<circle cx="60" cy="60" r="54" fill="none" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"
					stroke-dasharray="180 160" />
				<defs>
					<linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
						<stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
						<stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
					</linearGradient>
				</defs>
			</svg>
			<!-- Countdown number inside ring -->
			<div id="count" style="
                position: absolute;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                font-size: 42px;
                font-weight: 700;
                color: white;
                text-shadow: 0 0 20px #00f0ff, 0 0 40px #a855f7;
                transition: transform 0.15s ease, opacity 0.15s ease;
            ">5</div>
		</div>

		<!-- Title text -->
		<div style="
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00f0ff, #a855f7, #00f0ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 2s linear infinite;
            margin-bottom: 12px;
        ">Launching in</div>

		<!-- Subtext -->
		<div style="
    font-size: 12px;
    color: #444;
    letter-spacing: 2px;
    text-transform: uppercase;
">Please wait...</div>

		<!-- Credit -->
		<div style="
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #333;
">All programmed by <span style="
    background: linear-gradient(90deg, #00f0ff, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 600;
">D5ME</span></div>

		<!-- Bottom progress bar -->
		<div style="
            position: fixed;
            bottom: 0; left: 0;
            width: 100%; height: 3px;
            background: #111;
        ">
			<div id="progress-bar" style="
                height: 100%;
                width: 100%;
                background: linear-gradient(90deg, #00f0ff, #a855f7);
                transition: width 1s linear;
                box-shadow: 0 0 10px #00f0ff;
            "></div>
		</div>
	</div>

	<style>
		@keyframes spin {
			from {
				transform: rotate(0deg);
			}

			to {
				transform: rotate(360deg);
			}
		}

		@keyframes shimmer {
			from {
				background-position: 0% center;
			}

			to {
				background-position: 200% center;
			}
		}
	</style>
</body>
</body>

</html>
